<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gay Scheme</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      padding: 24px;
      box-sizing: border-box;
    }

    .image-card {
      max-width: 720px;
      width: 100%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .image-card img {
      display: block;
      max-width: 100%;
      max-height: 80vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    }
  </style>
</head>
<body>
  <div class="image-card">
    <img src="{{ url_for('static', filename='images/gay.jpg') }}" alt="Gay Scheme" />
  </div>
</body>
</html>
